apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: training-notification
  labels:
    app.kubernetes.io/name: training-notification
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - host: training-notification.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: training-notification
                port:
                  name: http
