apiVersion: apps/v1
kind: Deployment
metadata:
  name: training-notification
  labels:
    app.kubernetes.io/name: training-notification
    app.kubernetes.io/part-of: training-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: training-notification
  template:
    metadata:
      labels:
        app.kubernetes.io/name: training-notification
        app.kubernetes.io/part-of: training-platform
    spec:
      serviceAccountName: training-notification
      containers:
        - name: training-notification
          image: your-registry/training-notification:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: training-notification-config
            - secretRef:
                name: training-notification-secrets
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 512Mi
              cpu: 500m
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 45
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: training-notification
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: training-notification
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
