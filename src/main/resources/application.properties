spring.application.name=Training_Notification
server.port=8086

# --- DATABASE ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/notification_db}
spring.datasource.username=myuser
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:secret}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# --- HIKARI POOL OPTIMIZATION ---
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# --- TOMCAT OPTIMIZATION ---
server.tomcat.threads.min-spare=50
server.tomcat.max-connections=10000
# Hibernate batching (tune with load tests)
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Connection pool size
spring.datasource.hikari.maximum-pool-size=100
server.tomcat.threads.max=500
server.tomcat.accept-count=500

# Reduce SQL verbosity in logs
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# --- KAFKA ---
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9093}
spring.kafka.consumer.group-id=notification-clean-v5
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.example.training_notification.dto.TrainingDTO

# --- GMAIL SMTP ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=gravitya46@gmail.com
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.debug=false
spring.mail.properties.mail.mime.charset=UTF-8
spring.mail.properties.mail.smtp.auth.mechanisms=LOGIN

# --- OPTIONAL NOTIFIERS ---
telegram.enabled=${TELEGRAM_ENABLED:false}
telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
firebase.enabled=${FIREBASE_ENABLED:false}

# --- CACHE ---
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6380}
spring.cache.redis.time-to-live=600000
spring.cache.type=redis

# --- LOGGING ---
logging.level.root=WARN
logging.level.com.example.training_notification=INFO

spring.kafka.producer.acks=1
spring.kafka.producer.batch-size=16384
spring.kafka.producer.properties.linger.ms=10
spring.kafka.producer.compression-type=snappy

spring.docker.compose.enabled=false
