name: DevSecOps Ultimate Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # 1. Анализ кода и безопасность зависимостей
  code-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: dockerfile

      - name: Verify Dependencies
        run: mvn dependency:resolve -q

  # 2. Тестирование и сборка
  build-and-test:
    needs: code-security
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: notification_db
          POSTGRES_USER: myuser
          POSTGRES_PASSWORD: secret
        ports: [5432:5432]
      redis:
        image: redis:7
        ports: [6379:6379]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Checkstyle Control
        run: mvn checkstyle:check

      - name: Run Tests with Coverage
        run: mvn clean verify
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/notification_db
          SPRING_DATA_REDIS_PORT: 6379
          SPRING_MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}

      - name: Mutation Testing (PITest)
        run: mvn org.pitest:pitest-maven:mutationCoverage
        # Это найдет тесты, которые ничего не тестируют

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  # 3. Безопасность контейнера
  container-security:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Build Local Image
        run: docker build -f dockerfile -t temp-image:latest .

      - name: Scan Image with Trivy (Vulnerabilities)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'temp-image:latest'
          format: 'table'
          exit-code: '1' # Падаем только на критичных, фиксируемых уязвимостях
          severity: 'CRITICAL'
          ignore-unfixed: true

  # 4. Публикация и Деплой
  publish-and-deploy:
    needs: container-security
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    env:
      DEPLOY_HOST: ${{ secrets.SERVER_HOST }}
      DEPLOY_USER: ${{ secrets.SERVER_USER }}
      DEPLOY_KEY: ${{ secrets.SERVER_SSH_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Normalize image name
        run: echo "IMAGE_NAME_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
        shell: bash

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:latest

      - name: SSH Deploy
        if: env.DEPLOY_HOST != '' && env.DEPLOY_USER != '' && env.DEPLOY_KEY != ''
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ env.DEPLOY_KEY }}
          script: |
            cd /app/notification
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:latest
            docker compose up -d