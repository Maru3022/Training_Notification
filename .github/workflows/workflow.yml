name: Secure Multi-Stage CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  quality-gate:
    name: Quality Gate (lint + dependency sanity)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: dockerfile

      - name: Resolve Maven dependencies
        run: ./mvnw -B -ntp -DskipTests dependency:resolve

      - name: Checkstyle
        run: ./mvnw -B -ntp checkstyle:check

  test-and-package:
    name: Integration tests + package
    needs: quality-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: notification_db
          POSTGRES_USER: myuser
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U myuser -d notification_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run tests and package
        run: ./mvnw -B -ntp clean verify
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/notification_db
          SPRING_DATA_REDIS_PORT: 6379
          SPRING_MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}

      - name: Prepare single JAR artifact
        shell: bash
        run: |
          mkdir -p out
          cp target/*-SNAPSHOT.jar out/app.jar

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: out/app.jar
          retention-days: 7

  dependency-security:
    name: Source dependency vulnerability scan
    needs: quality-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Trivy filesystem scan (gate on CRITICAL)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "1"

      - name: Trivy filesystem scan (SARIF)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: sarif
          output: trivy-fs.sarif
          exit-code: "0"

      - name: Upload filesystem scan to code scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif

  container-security:
    name: Container security scan
    needs: test-and-package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Build local image
        run: docker build -f dockerfile -t local/training-notification:${{ github.sha }} .

      - name: Trivy image scan (gate on CRITICAL)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: local/training-notification:${{ github.sha }}
          severity: CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "1"

      - name: Trivy image scan (SARIF)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: local/training-notification:${{ github.sha }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: sarif
          output: trivy-image.sarif
          exit-code: "0"

      - name: Upload image scan to code scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif

  publish-image:
    name: Publish container image
    needs: [test-and-package, dependency-security, container-security]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Normalize image name
        shell: bash
        run: echo "IMAGE_NAME_LC=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ github.sha }}

  deploy:
    name: Deploy via SSH
    needs: publish-image
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
    env:
      DEPLOY_HOST: ${{ secrets.SERVER_HOST }}
      DEPLOY_USER: ${{ secrets.SERVER_USER }}
      DEPLOY_KEY: ${{ secrets.SERVER_SSH_KEY }}
    steps:
      - name: Normalize image name
        shell: bash
        run: echo "IMAGE_NAME_LC=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Deploy to server
        if: env.DEPLOY_HOST != '' && env.DEPLOY_USER != '' && env.DEPLOY_KEY != ''
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ env.DEPLOY_KEY }}
          script: |
            set -e
            cd /app/notification
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ github.sha }}
            docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:latest
            if docker compose version >/dev/null 2>&1; then
              docker compose up -d
            else
              docker-compose up -d
            fi