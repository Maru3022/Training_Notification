name: Kubernetes Delivery Pipeline

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  JAVA_VERSION: "17"

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: dockerfile

      - name: Enforce toolchain and run Checkstyle
        run: ./mvnw -B -ntp -DskipTests checkstyle:check validate

  test-and-coverage:
    name: Tests And Coverage
    needs: quality-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: notification_db
          POSTGRES_USER: myuser
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U myuser -d notification_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run tests and package
        run: ./mvnw -B -ntp clean verify
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/notification_db
          SPRING_DATASOURCE_USERNAME: myuser
          SPRING_DATASOURCE_PASSWORD: secret
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379
          SPRING_MAIL_USERNAME: ci@example.com
          SPRING_MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*-SNAPSHOT.jar
          retention-days: 7

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco
          retention-days: 7

  source-security:
    name: Source Security
    needs: quality-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Trivy filesystem scan
        shell: bash
        run: |
          docker run --rm \
            -v "${PWD}:/workdir" \
            -w /workdir \
            ghcr.io/aquasecurity/trivy:0.61.0 \
            fs \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --format sarif \
            --output trivy-fs.sarif \
            .

      - name: Upload filesystem SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif

  kubernetes-validate:
    name: Validate Kubernetes Manifests
    needs: quality-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.2

      - name: Install kubeconform
        shell: bash
        run: |
          curl -sSL -o kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz kubeconform
          sudo mv kubeconform /usr/local/bin/kubeconform

      - name: Render production overlay
        run: kubectl kustomize k8s/overlays/prod > rendered-k8s.yaml

      - name: Validate rendered manifests
        run: kubeconform -strict -summary rendered-k8s.yaml

  build-image:
    name: Build Container Image
    needs: [test-and-coverage, kubernetes-validate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target

      - name: Normalize image name
        shell: bash
        run: echo "IMAGE_NAME_LC=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}
          tags: |
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  container-security:
    name: Container Security
    needs: build-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target

      - name: Normalize image name
        shell: bash
        run: echo "IMAGE_NAME_LC=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Build local image for scan
        run: docker build -f dockerfile -t local/training-notification:${{ github.sha }} .

      - name: Trivy image scan
        shell: bash
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${PWD}:/workdir" \
            -w /workdir \
            ghcr.io/aquasecurity/trivy:0.61.0 \
            image \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --format sarif \
            --output trivy-image.sarif \
            local/training-notification:${{ github.sha }}

      - name: Upload image SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif

  deploy-production:
    name: Deploy To Kubernetes
    needs: [source-security, build-image, container-security]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: read
    env:
      K8S_NAMESPACE: training-notification
      KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
      SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
      SPRING_MAIL_PASSWORD: ${{ secrets.SPRING_MAIL_PASSWORD }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Normalize image name
        shell: bash
        run: echo "IMAGE_NAME_LC=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.2

      - name: Configure kubeconfig
        if: env.KUBE_CONFIG_DATA != ''
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_DATA" | base64 -d > "$HOME/.kube/config"

      - name: Create runtime secret
        if: env.KUBE_CONFIG_DATA != ''
        shell: bash
        run: |
          kubectl create namespace "$K8S_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n "$K8S_NAMESPACE" create secret generic training-notification-secrets \
            --from-literal=SPRING_DATASOURCE_PASSWORD="$SPRING_DATASOURCE_PASSWORD" \
            --from-literal=SPRING_MAIL_PASSWORD="$SPRING_MAIL_PASSWORD" \
            --from-literal=TELEGRAM_BOT_TOKEN="$TELEGRAM_BOT_TOKEN" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Set image tag in overlay
        if: env.KUBE_CONFIG_DATA != ''
        shell: bash
        run: |
          cd k8s/overlays/prod
          kubectl kustomize . >/dev/null
          sed -i "s/newTag: latest/newTag: sha-${GITHUB_SHA}/" kustomization.yaml
          sed -i "s#ghcr.io/maru3022/training_notification#${REGISTRY}/${IMAGE_NAME_LC}#g" kustomization.yaml

      - name: Deploy manifests
        if: env.KUBE_CONFIG_DATA != ''
        run: kubectl apply -k k8s/overlays/prod

      - name: Wait for rollout
        if: env.KUBE_CONFIG_DATA != ''
        run: kubectl -n "$K8S_NAMESPACE" rollout status deployment/training-notification --timeout=180s
